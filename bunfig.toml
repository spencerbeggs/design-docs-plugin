[install]
peer = true

[test]
coverage = true
coverageSkipTestFiles = true  # default false
# To require 90% line-level and function-level coverage
coverageThreshold = { lines = 0.8, functions = 0.8, statements= 0.8, perFile = true }
coveragePathIgnorePatterns = [
  # plugin.config.ts setup() runs at build time, not in unit tests
  "plugin/plugin.config.ts",
]
coverageReporter  = ["text", "lcov"]
